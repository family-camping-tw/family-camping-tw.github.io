<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="以高鐵新竹站出發，篩選適合親子家庭的露營地。">
    <meta property="og:title" content="親子露營搜尋">
    <meta property="og:description" content="依車程、雨棚、戲水設施與場地條件，找到適合全家的營地。">
    <meta property="og:image" content="assets/camping-family-header.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>親子露營搜尋</title>
    <link rel="stylesheet" href="styles.css?v=20260716-data-status">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="brand">親子露營搜尋</p>
        <p class="brand-note">從高鐵新竹站出發</p>
      </div>
      <button class="icon-button" id="mobile-filter-button" type="button" aria-label="開啟篩選" aria-controls="filters" aria-expanded="false" title="篩選">
        <span aria-hidden="true">☰</span>
      </button>
    </header>

    <main>
      <section class="search-band" aria-labelledby="search-title">
        <img class="search-band-image" src="assets/camping-family-header.png" alt="山區草地與碎石營位、家庭帳篷和兒童遊樂設施">
        <div>
          <h1 id="search-title">找到這次適合全家的營地</h1>
          <p>依車程、雨棚、戲水設施與場地條件縮小選擇。</p>
        </div>
        <label class="search-box">
          <span class="sr-only">搜尋營地</span>
          <span aria-hidden="true">⌕</span>
          <input id="search-input" type="search" placeholder="搜尋營地、縣市或鄉鎮">
        </label>
      </section>

      <div class="app-shell">
        <button class="filter-backdrop" id="filter-backdrop" type="button" aria-label="關閉篩選" tabindex="-1"></button>
        <aside class="filters" id="filters" aria-label="營地篩選">
          <div class="filter-heading">
            <h2>篩選條件</h2>
            <div class="filter-heading-actions">
              <button class="text-button" id="reset-filters" type="button">全部清除</button>
              <button class="icon-button mobile-filter-close" id="close-mobile-filters" type="button" aria-label="關閉篩選" title="關閉">×</button>
            </div>
          </div>

          <label class="field">縣市<select id="filter-county"><option value="">全部縣市</option></select></label>
          <label class="field">訂位平台<select id="filter-booking"><option value="">全部平台</option></select></label>
          <label class="field">最長車程<select id="filter-drive"><option value="">不限</option><option value="60">1 小時內</option><option value="90">1.5 小時內</option><option value="120">2 小時內</option><option value="180">3 小時內</option></select></label>
          <label class="field">最高海拔<select id="filter-altitude"><option value="">不限</option><option value="500">500 公尺以下</option><option value="800">800 公尺以下</option><option value="1000">1000 公尺以下</option><option value="1500">1500 公尺以下</option></select></label>
          <label class="field">營地材質<select id="filter-surface"><option value="">不限</option><option>草地</option><option>碎石</option><option>草石混合</option><option>木棧板</option><option>水泥或硬地</option><option>多種材質</option><option>不確定</option></select></label>

          <fieldset>
            <legend>家庭需求</legend>
            <label class="check-row"><input type="checkbox" id="filter-rain"> 有雨棚</label>
            <label class="check-row"><input type="checkbox" id="filter-kids"> 有戲水或兒童設施</label>
            <label class="check-row"><input type="checkbox" id="filter-lodging"> 有免搭帳或房型</label>
            <label class="check-row"><input type="checkbox" id="filter-car"> 可在自備車輛內過夜</label>
            <label class="check-row"><input type="checkbox" id="filter-car-side"> 車可停帳邊</label>
            <label class="check-row"><input type="checkbox" id="filter-rv-lodging"> 提供露營車房型</label>
          </fieldset>

          <div class="mobile-filter-actions">
            <button class="primary-button" id="apply-mobile-filters" type="button">顯示結果</button>
          </div>
        </aside>

        <section class="results" aria-live="polite">
          <div class="results-toolbar">
            <p id="result-count"></p>
            <label class="sort-field">排序<select id="sort-select"><option value="drive">車程由短到長</option><option value="rating">Google 星等由高到低</option><option value="altitude">海拔由低到高</option></select></label>
          </div>
          <div class="active-filters" id="active-filters"></div>
          <div class="camp-list" id="camp-list"></div>
          <div class="empty-state" id="empty-state" hidden>
            <h2>沒有符合的營地</h2>
            <p>放寬一兩個條件，再看看其他選擇。</p>
          </div>
        </section>
      </div>
    </main>

    <section class="compare-dock" id="compare-dock" aria-label="營地比較" hidden>
      <div><strong>比較營地</strong><span id="compare-summary"></span></div>
      <button class="primary-button" id="open-compare" type="button">開啟比較</button>
    </section>

    <dialog id="compare-dialog">
      <div class="dialog-header">
        <div><p class="eyebrow">最多 3 個營地</p><h2>營地比較</h2></div>
        <button class="icon-button" id="close-compare" type="button" aria-label="關閉比較" title="關閉">×</button>
      </div>
      <div class="compare-table-wrap" id="compare-table"></div>
    </dialog>

    <script src="config.js?v=20260716-google-ai"></script>
    <script src="data/camps.js?v=20260716-local-fallback"></script>
    <script src="data/evidence.js?v=20260716-local-fallback"></script>
    <script src="app.js?v=20260716-google-ai"></script>
  </body>
</html>
